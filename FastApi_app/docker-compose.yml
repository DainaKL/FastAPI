services:
  postgres:
    image: postgres:17-alpine3.21
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastapi_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fastapi_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_network

  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./media:/app/media
      - ./alembic:/app/alembic
      - ./start.sh:/app/.
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/fastapi_db
      DATABASE_SYNC_URL: postgresql://postgres:postgres@postgres:5432/fastapi_db
      SECRET_AUTH_KEY: your-super-secret-key
      DEBUG: "True"
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data: